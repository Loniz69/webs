<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test</title>

    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: linear-gradient(135deg, #ff0080, #ff8c00);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 18px;
    text-align: center;
    max-width: 500px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,.35);
}

h1 {
    margin-bottom: 20px;
}

p {
    line-height: 1.6;
}

button {
    margin-top: 25px;
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: .2s;
}

button:hover {
    transform: translateY(-2px);
}

#message {
    margin-top: 20px;
    font-weight: bold;
}
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 GitHub Pages is Working!</h1>

    <p>
        If you're reading this, congratulations!
        Your website is successfully being hosted on GitHub Pages.
    </p>

    <button id="magicButton">
        Click Me
    </button>

    <p id="message"></p>
</div>

<script src="script.js"></script>

</body>
</html>
